name: Firebase Hosting Auto Deploy

on:
  push:
    branches:
      - claude/setup-multi-app-dev-1y2PR
      - main
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firebase-hosting-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Check menu links exist
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r m; do
            path=$(echo "$m" | sed 's|href="/|public/|;s|/"$||')
            if [ ! -f "$path/index.html" ]; then
              echo "MISSING: $path/index.html (referenced by public/index.html)"
              missing=$((missing+1))
            fi
          done < <(grep -oE 'href="/[a-zA-Z0-9_-]+/"' public/index.html | sort -u)
          if [ "$missing" -gt 0 ]; then
            echo "Aborting deploy: $missing menu link(s) point to missing pages."
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:village-tsubasa --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
