<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スケジュール確認</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f4ef;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: rgba(255, 253, 250, 0.98);
        --line: rgba(223, 207, 196, 0.92);
        --text: #463830;
        --muted: #7b6c63;
        --pink: #f5d9dd;
        --pink-strong: #e8b9c1;
        --beige: #f4e7d8;
        --shadow: 0 20px 42px rgba(144, 113, 98, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(245, 217, 221, 0.62), transparent 26%),
          radial-gradient(circle at top right, rgba(244, 231, 216, 0.88), transparent 30%),
          linear-gradient(180deg, #fcfaf7 0%, var(--bg) 100%);
      }

      .page {
        width: min(1540px, calc(100% - 24px));
        margin: 0 auto;
        padding: 18px 0 32px;
      }

      .topbar {
        margin-bottom: 12px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        text-decoration: none;
        font-weight: 700;
      }

      .surface {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel));
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 20px 24px 18px;
      }

      .hero-head {
        display: block;
      }

      .hero h1 {
        margin: 8px 0 0;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        line-height: 1.15;
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1.6fr auto auto;
        gap: 12px;
        margin-top: 20px;
      }

      .search-wrap,
      .month-wrap,
      .calendar-panel,
      .columns-panel {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
      }

      .search-wrap,
      .month-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 58px;
        padding: 0 16px;
      }

      .search-wrap input {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      .search-wrap input:focus {
        outline: none;
      }

      .month-wrap button,
      .week-button,
      .modal-close {
        border: 0;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--pink), var(--beige));
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .month-wrap button {
        padding: 10px 14px;
      }

      .month-wrap {
        justify-content: space-between;
        min-width: 250px;
      }

      .month-label {
        font-weight: 800;
      }

      .schedule-layout {
        display: grid;
        gap: 16px;
        margin-top: 16px;
      }

      .calendar-panel,
      .columns-panel,
      .week-wrap {
        padding: 18px;
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .panel-copy {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 0.95rem;
      }

      .calendar-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
      }

      .calendar-weekday {
        text-align: center;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 700;
      }

      .calendar-cell {
        min-height: 132px;
        padding: 9px;
        border: 1px solid rgba(223, 207, 196, 0.9);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        cursor: pointer;
      }

      .calendar-cell.is-empty {
        background: rgba(245, 241, 235, 0.82);
        cursor: default;
      }

      .calendar-cell.is-today {
        border-color: rgba(232, 185, 193, 0.98);
        box-shadow: inset 0 0 0 1px rgba(232, 185, 193, 0.65);
      }

      .calendar-cell.is-active-week {
        background: linear-gradient(180deg, rgba(255, 249, 244, 0.98), rgba(255, 244, 237, 0.96));
      }

      .calendar-date {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .calendar-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        height: 30px;
        border-radius: 999px;
        background: rgba(245, 217, 221, 0.7);
        color: #7a5d63;
        font-size: 0.82rem;
      }

      .calendar-preview {
        margin-top: 8px;
        display: grid;
        gap: 5px;
      }

      .calendar-preview-item {
        display: grid;
        gap: 2px;
        padding: 6px 7px;
        border-radius: 10px;
        background: rgba(239, 225, 212, 0.68);
        font-size: 0.7rem;
        line-height: 1.3;
        color: var(--muted);
      }

      .calendar-preview-helper {
        font-weight: 800;
        color: var(--text);
      }

      .calendar-preview-user {
        font-weight: 800;
        color: var(--text);
      }

      .calendar-preview-line,
      .calendar-preview-summary,
      .calendar-preview-more {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .calendar-preview-summary {
        color: #b23a2b;
      }

      .calendar-preview-more {
        padding: 4px 7px;
        border-radius: 10px;
        background: rgba(245, 217, 221, 0.52);
        font-size: 0.72rem;
        font-weight: 700;
        color: #7a5d63;
      }

      .week-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
      }

      .week-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .week-button {
        padding: 10px 14px;
      }

      .week-button.is-active {
        background: linear-gradient(135deg, var(--pink-strong), #e9cfc0);
      }

      .columns-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 12px;
      }

      .day-column {
        min-width: 0;
        padding: 14px;
        border: 1px solid rgba(223, 207, 196, 0.94);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.9);
      }

      .day-column.is-muted {
        opacity: 0.55;
      }

      .day-column-head {
        display: grid;
        gap: 4px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(223, 207, 196, 0.76);
      }

      .day-column-label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
      }

      .day-column-date {
        font-size: 1.1rem;
        font-weight: 800;
      }

      .day-column-body {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .empty-card {
        padding: 14px 12px;
        border-radius: 16px;
        background: rgba(245, 241, 235, 0.78);
        color: var(--muted);
        font-size: 0.9rem;
      }

      .schedule-card {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(255, 247, 241, 0.96), rgba(255, 255, 255, 0.98));
        border: 1px solid rgba(234, 222, 214, 0.9);
      }

      .schedule-card__time {
        font-size: 0.84rem;
        font-weight: 800;
        color: #7a5b4d;
      }

      .schedule-card__helper {
        font-weight: 800;
      }

      .schedule-card__user,
      .schedule-card__meta,
      .schedule-card__summary {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.6;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(78, 61, 53, 0.3);
        z-index: 20;
      }

      .modal-overlay.is-open {
        display: flex;
      }

      .modal {
        width: min(760px, 100%);
        max-height: min(80vh, 760px);
        overflow: auto;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 252, 249, 0.98);
        box-shadow: 0 22px 42px rgba(110, 85, 73, 0.18);
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .modal-title {
        margin: 0;
        font-size: 1.2rem;
      }

      .modal-meta {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .modal-close {
        padding: 10px 14px;
      }

      .modal-body {
        display: grid;
        gap: 12px;
      }

      .modal-body .schedule-card--modal {
        gap: 10px;
        padding: 14px 15px;
        background: #ffffff;
        border: 1px solid rgba(234, 222, 214, 0.92);
      }

      .schedule-card__headline {
        font-size: 0.98rem;
        font-weight: 800;
        color: #3f3028;
        line-height: 1.5;
      }

      .schedule-card__line {
        display: grid;
        grid-template-columns: 1.45rem minmax(0, 1fr);
        align-items: start;
        column-gap: 6px;
        color: #54453c;
        font-size: 0.9rem;
        line-height: 1.7;
      }

      .schedule-card__icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
      }

      .schedule-card__value {
        min-width: 0;
        word-break: break-word;
      }

      .schedule-card__value.is-strong {
        font-weight: 800;
        color: #3f3028;
      }

      .schedule-card__line.is-summary {
        color: #b23a2b;
      }

      .modal-empty {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(245, 241, 235, 0.74);
        color: var(--muted);
      }

      @media (max-width: 1180px) {
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 860px) {
        .page {
          width: min(100% - 18px, 760px);
        }

        .week-wrap {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .calendar-grid,
        .columns-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <a class="back-link" href="/">ビレッジひろばに戻る</a>
      </div>

      <section class="surface hero">
        <div class="hero-head">
          <div>
            <h1 id="page-title">2026年3月 ビレッジスケジュール</h1>
            <p>月間スケジュールを確認するための画面です。月切替、名前検索、週表示切替から予定を確認できます。</p>
          </div>
        </div>

        <div class="toolbar">
          <label class="search-wrap" for="search-helper">
            <span>名前検索</span>
            <input id="search-helper" type="search" placeholder="ヘルパー名で検索" />
          </label>

          <div class="month-wrap">
            <button id="prev-month" type="button">前月</button>
            <span id="month-label" class="month-label">2026年3月</span>
            <button id="next-month" type="button">次月</button>
          </div>

          <div class="month-wrap">
            <span>表示週</span>
            <span id="week-summary" class="month-label">全週表示</span>
          </div>
        </div>
      </section>

      <section class="schedule-layout">
        <section class="calendar-panel">
          <div class="calendar-summary">
            <div>
              <h2 class="panel-title">月カレンダー</h2>
              <p class="panel-copy">日ごとの件数と予定の抜粋を表示します。日付をクリックするとその日の詳細を開けます。</p>
            </div>
          </div>
          <div id="schedule-calendar"></div>
        </section>

        <section class="columns-panel">
          <div class="week-wrap">
            <div>
              <h2 class="panel-title">日ごとの予定一覧</h2>
              <p class="panel-copy">スケジュールを横幅いっぱいに使って確認できます。</p>
            </div>
            <div id="week-buttons" class="week-buttons"></div>
          </div>
          <div id="schedule-columns"></div>
        </section>
      </section>
    </main>

    <div id="day-modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="day-modal-title">
        <div class="modal-head">
          <div>
            <h2 id="day-modal-title" class="modal-title">日別予定</h2>
            <p id="day-modal-meta" class="modal-meta"></p>
          </div>
          <button id="day-modal-close" class="modal-close" type="button">閉じる</button>
        </div>
        <div id="day-modal-body" class="modal-body"></div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
