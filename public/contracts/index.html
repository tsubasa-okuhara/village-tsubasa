<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雇用契約 - ビレッジひろば</title>
    <style>
      :root {
        --bg: #fffdf8;
        --panel: #ffffff;
        --line: #e4d5bf;
        --text: #3e342f;
        --muted: #72655d;
        --accent: #d5bb93;
        --accent-strong: #c7a773;
        --accent-soft: #f3eadc;
        --success: #587960;
        --success-soft: #e8f0ea;
        --danger: #b54d59;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(235, 221, 198, 0.6), transparent 28%),
          radial-gradient(circle at top right, rgba(247, 240, 225, 0.95), transparent 34%),
          linear-gradient(180deg, #fffefb 0%, var(--bg) 42%, #f8f3ea 100%);
      }

      .page {
        width: min(640px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .back-home-btn {
        display: inline-block;
        margin-bottom: 16px;
        padding: 10px 20px;
        background: #6b4c3b;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 12px;
        border: 2px solid #5a3e2f;
        box-shadow: 0 2px 8px rgba(107, 76, 59, 0.18);
      }
      .back-home-btn:hover { background: #5a3e2f; }

      .hero {
        text-align: center;
        margin-bottom: 22px;
      }
      .hero h1 {
        font-size: 1.6rem;
        margin: 0 0 6px;
        color: #6b4c3b;
      }
      .hero p {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0;
      }

      .email-input-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 18px;
      }
      .email-input-wrap label {
        display: block;
        font-size: 0.88rem;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .email-input-wrap input {
        width: 100%;
        padding: 10px 12px;
        font-size: 1rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        font-family: inherit;
      }

      .contract-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .contract-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 2px 10px rgba(107, 76, 59, 0.05);
      }
      .contract-card h2 {
        font-size: 1.05rem;
        margin: 0 0 6px;
        color: #5a3e2f;
      }
      .contract-meta {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .status-chip {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 600;
        margin-left: 6px;
      }
      .status-pending_signature { background: #fff3d0; color: #8a6600; }
      .status-signed             { background: var(--success-soft); color: var(--success); }
      .status-revoked            { background: #fde7ea; color: var(--danger); }
      .status-expired            { background: #ede7e0; color: var(--muted); }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .btn {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }
      .btn-primary {
        background: var(--accent-strong);
        color: #fff;
        border-color: var(--accent-strong);
      }
      .btn-primary:hover { background: #b89560; }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 30px 10px;
        background: var(--panel);
        border: 1px dashed var(--line);
        border-radius: 16px;
      }

      .loading, .error {
        text-align: center;
        padding: 20px;
        color: var(--muted);
      }
      .error { color: var(--danger); }

      .stub-notice {
        margin-top: 24px;
        padding: 12px 14px;
        background: #fff3d0;
        border-left: 4px solid #c49500;
        color: #6c5200;
        font-size: 0.85rem;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="back-home-btn" href="/">← ホーム</a>

      <div class="hero">
        <h1>📄 雇用契約</h1>
        <p>自分宛の雇用契約書を確認・署名できます</p>
      </div>

      <div class="email-input-wrap">
        <label for="emailInput">ログイン用メールアドレス</label>
        <input id="emailInput" type="email" placeholder="your@example.com" />
      </div>

      <div id="list" class="contract-list">
        <div class="loading">読み込み中…</div>
      </div>

      <div class="stub-notice">
        <strong>🚧 Phase 4 雛形</strong>：この画面は電子契約機能の雛形です。
        実際の署名フロー（クラウドサイン連携）は Phase 3.2 以降で実装予定。
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
