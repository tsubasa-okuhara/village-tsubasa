<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雇用契約 - 署名 - ビレッジひろば</title>
    <style>
      :root {
        --bg: #fffdf8;
        --line: #e4d5bf;
        --text: #3e342f;
        --muted: #72655d;
        --accent-strong: #c7a773;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        width: min(640px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }
      .back {
        display: inline-block;
        margin-bottom: 16px;
        padding: 10px 20px;
        background: #6b4c3b;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
      }
      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
      }
      h1 {
        margin-top: 0;
        color: #6b4c3b;
      }
      .notice {
        margin-top: 20px;
        padding: 14px 16px;
        background: #fff3d0;
        border-left: 4px solid #c49500;
        color: #6c5200;
        font-size: 0.9rem;
        border-radius: 10px;
      }
      .sign-btn {
        display: block;
        width: 100%;
        margin-top: 24px;
        padding: 14px;
        background: var(--accent-strong);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
      }
      .sign-btn:hover { background: #b89560; }
      .meta { color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="page">
      <a class="back" href="./">← 契約一覧へ</a>

      <div class="panel">
        <h1>契約書への署名</h1>
        <div id="meta" class="meta">読み込み中…</div>

        <div class="notice">
          <strong>🚧 Phase 4 雛形</strong><br />
          この画面は Phase 4 の雛形です。実際の署名ボタンを押すと
          クラウドサインの署名画面を iframe または別タブで開く予定（Phase 3.2 以降）。
        </div>

        <button id="signBtn" class="sign-btn" disabled>
          署名する（未実装）
        </button>
      </div>
    </div>
    <script>
      (function () {
        const API_BASE =
          "https://asia-northeast1-village-tsubasa.cloudfunctions.net/api";
        const id = new URLSearchParams(location.search).get("id");
        const metaEl = document.getElementById("meta");
        const btn = document.getElementById("signBtn");
        if (!id) {
          metaEl.textContent = "契約IDが指定されていません";
          return;
        }
        const email =
          localStorage.getItem("village-tsubasa-helper-email") || "";

        fetch(
          API_BASE +
            "/contracts/" +
            encodeURIComponent(id) +
            "?email=" +
            encodeURIComponent(email),
        )
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (!j.contract) {
              metaEl.textContent = "契約が見つかりません";
              return;
            }
            metaEl.textContent =
              "タイトル: " + j.contract.title + "（状態: " + j.contract.status + "）";
          })
          .catch(function () {
            metaEl.textContent = "読み込みに失敗しました";
          });

        btn.addEventListener("click", function () {
          alert("Phase 3.2 以降で実装予定の署名フローです。");
        });
      })();
    </script>
  </body>
</html>
