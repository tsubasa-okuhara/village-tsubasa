<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="referrer" content="no-referrer" />
    <title>クイック記録（オーナー専用）</title>
    <style>
      :root {
        --bg: #fcf8f4;
        --panel: #ffffff;
        --line: #e7d6c7;
        --text: #5a463b;
        --muted: #8b7568;
        --accent: #d77f52;
        --accent-soft: #f7e1d4;
        --accent-strong: #b76137;
        --success: #1f7a52;
        --error: #b84d3d;
        --tab-bg: #f5e9dd;
        --shadow: 0 4px 12px rgba(121, 87, 65, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--text);
        background: var(--bg);
        font-size: 16px;
        line-height: 1.6;
      }

      .page {
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 16px 12px 80px;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 12px;
        padding: 8px 16px;
        background: #6b4c3b;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 8px;
      }

      .header {
        margin-bottom: 16px;
      }
      .header h1 {
        margin: 0 0 4px;
        font-size: 1.5rem;
      }
      .header__sub {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .gate {
        padding: 24px 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 16px;
      }
      .gate h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .gate__msg {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .gate input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        font-size: 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .gate__actions {
        display: flex;
        gap: 8px;
      }
      .gate__error {
        color: var(--error);
        font-size: 0.85rem;
        margin: 8px 0 0;
      }

      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
      }
      .tab {
        flex: 1;
        padding: 12px 8px;
        background: var(--tab-bg);
        border: 1px solid var(--line);
        border-radius: 8px 8px 0 0;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        text-align: center;
        color: var(--muted);
      }
      .tab.is-active {
        background: var(--panel);
        color: var(--accent-strong);
        border-bottom-color: var(--panel);
        position: relative;
        top: 1px;
      }
      .tab__badge {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-size: 0.75rem;
        padding: 1px 8px;
        border-radius: 999px;
        margin-left: 4px;
      }

      .panel-content {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 0 8px 12px 12px;
        padding: 12px;
        min-height: 200px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .toolbar__email {
        font-family: monospace;
      }

      .button {
        padding: 12px 20px;
        font-size: 1rem;
        font-weight: 700;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
      }
      .button--ghost {
        background: transparent;
        color: var(--accent-strong);
      }
      .button--small {
        padding: 6px 12px;
        font-size: 0.85rem;
      }
      .button--secondary {
        background: var(--accent-soft);
        color: var(--accent-strong);
        border-color: var(--accent-soft);
      }
      .button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .task-list {
        display: grid;
        gap: 10px;
      }
      .task-card {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        cursor: pointer;
        transition: box-shadow 0.15s;
      }
      .task-card:hover, .task-card:active {
        box-shadow: var(--shadow);
        border-color: var(--accent);
      }
      .task-card__time {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--accent-strong);
        margin-bottom: 4px;
      }
      .task-card__user {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .task-card__task {
        font-size: 0.85rem;
        color: var(--muted);
      }
      .task-card__cta {
        margin-top: 8px;
        font-size: 0.85rem;
        color: var(--accent-strong);
        font-weight: 600;
      }

      .empty-state {
        text-align: center;
        padding: 32px 12px;
        color: var(--muted);
      }
      .empty-state__icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .status {
        font-size: 0.85rem;
        color: var(--muted);
        margin: 8px 0;
      }
      .status.is-error { color: var(--error); }
      .status.is-success { color: var(--success); }

      /* 入力モーダル */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 50;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      .modal[hidden] { display: none; }
      .modal__sheet {
        width: 100%;
        max-width: 720px;
        background: var(--panel);
        border-radius: 16px 16px 0 0;
        max-height: 90vh;
        overflow-y: auto;
        padding: 16px;
      }
      @media (min-width: 720px) {
        .modal { align-items: center; }
        .modal__sheet { border-radius: 16px; max-height: 80vh; }
      }
      .modal__head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .modal__title {
        margin: 0;
        font-size: 1.1rem;
      }
      .modal__close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 4px 8px;
      }

      .form-row {
        margin-bottom: 12px;
      }
      .form-row__label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 4px;
        color: var(--muted);
      }
      .form-row__value {
        padding: 10px 12px;
        background: var(--accent-soft);
        border-radius: 8px;
        font-size: 0.95rem;
      }
      .category-buttons {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .category-button {
        flex: 1;
        min-width: 80px;
        padding: 10px 8px;
        font-size: 0.9rem;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
      }
      .category-button.is-active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .form-row textarea {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        font-family: inherit;
        border: 1px solid var(--line);
        border-radius: 8px;
        line-height: 1.6;
        resize: vertical;
      }
      .form-row textarea.memo { min-height: 100px; }
      .form-row textarea.final-note { min-height: 120px; }

      .form-actions {
        display: flex;
        gap: 8px;
        position: sticky;
        bottom: 0;
        background: var(--panel);
        padding-top: 12px;
        border-top: 1px solid var(--line);
        margin-top: 16px;
      }
      .form-actions .button {
        flex: 1;
      }

      .toggle-row {
        margin-bottom: 12px;
      }
      .toggle-button {
        background: none;
        border: 1px solid var(--line);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="/" class="back-link">← トップに戻る</a>

      <div class="header">
        <h1>⚡ クイック記録</h1>
        <p class="header__sub">オーナー専用の高速サービス記録入力</p>
      </div>

      <!-- ゲート: メールアドレス入力（admin@village-support.jp 限定） -->
      <section id="gate" class="gate">
        <h2>メールアドレス確認</h2>
        <p class="gate__msg">
          このページはオーナー専用です。<br />
          登録メールアドレスを入力してください。
        </p>
        <input
          id="gate-email"
          type="email"
          autocomplete="email"
          placeholder="admin@village-support.jp"
        />
        <div class="gate__actions">
          <button id="gate-submit" class="button">確認</button>
        </div>
        <p id="gate-error" class="gate__error" hidden></p>
      </section>

      <!-- メイン: タブ + 一覧 -->
      <section id="main" hidden>
        <div class="toolbar">
          <span>ログイン: <span id="current-email" class="toolbar__email"></span></span>
          <button id="logout-button" class="button button--ghost button--small">解除</button>
        </div>

        <div class="tabs" role="tablist">
          <button id="tab-home" class="tab is-active" role="tab" data-category="home">
            居宅 <span id="badge-home" class="tab__badge" hidden>0</span>
          </button>
          <button id="tab-move" class="tab" role="tab" data-category="move">
            移動 <span id="badge-move" class="tab__badge" hidden>0</span>
          </button>
        </div>

        <div class="panel-content">
          <p id="list-status" class="status">読み込み中…</p>
          <div id="task-list" class="task-list"></div>
          <div id="empty-state" class="empty-state" hidden>
            <div class="empty-state__icon">🎉</div>
            <p>未記録の予定はありません。</p>
          </div>
        </div>
      </section>
    </div>

    <!-- 入力モーダル -->
    <div id="form-modal" class="modal" hidden>
      <div class="modal__sheet">
        <div class="modal__head">
          <h3 id="form-title" class="modal__title">記録入力</h3>
          <button id="form-close" class="modal__close" aria-label="閉じる">×</button>
        </div>

        <div class="form-row">
          <div class="form-row__label">サービス日 / 時間</div>
          <div id="form-datetime" class="form-row__value"></div>
        </div>

        <div class="form-row">
          <div class="form-row__label">利用者</div>
          <div id="form-user" class="form-row__value"></div>
        </div>

        <div class="form-row">
          <div class="form-row__label">サービス内容</div>
          <div id="form-task" class="form-row__value"></div>
        </div>

        <!-- 居宅のみ: 区分ボタン -->
        <div id="form-category-row" class="form-row" hidden>
          <div class="form-row__label">区分</div>
          <div class="category-buttons" id="category-buttons">
            <button type="button" class="category-button" data-category-value="身体介護">身体介護</button>
            <button type="button" class="category-button" data-category-value="家事援助">家事援助</button>
            <button type="button" class="category-button" data-category-value="通院等介助">通院等</button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-row__label">メモ <span style="color:var(--error)">*</span></div>
          <textarea
            id="form-memo"
            class="memo"
            placeholder="当日の様子や気づきを入力"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-row__label">記録本文（自動生成、必要なら編集）</div>
          <textarea id="form-final-note" class="final-note"></textarea>
          <button id="form-regen-note" class="button button--ghost button--small" type="button" style="margin-top:6px">
            🔄 メモから再生成
          </button>
        </div>

        <p id="form-status" class="status"></p>

        <div class="form-actions">
          <button id="form-save-next" class="button button--secondary" type="button">
            💾 保存して次へ
          </button>
          <button id="form-save-close" class="button" type="button">
            💾 保存して閉じる
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/qrec-okuhara-9k2b/main.js"></script>
  </body>
</html>
