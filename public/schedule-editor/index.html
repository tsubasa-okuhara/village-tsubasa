<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スケジュール編集</title>
    <link rel="stylesheet" href="style.css" />
    <!-- AG Grid Community（無料） -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/styles/ag-grid.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/styles/ag-theme-alpine.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/dist/ag-grid-community.min.js"></script>
  </head>
  <body>
    <header class="page-header">
      <a class="back-link" href="/">← ビレッジひろばに戻る</a>
      <h1 id="page-title">スケジュール編集</h1>
    </header>

    <!-- 認証画面 -->
    <section id="auth-screen" class="auth-screen">
      <div class="auth-card">
        <h2>編集者ログイン</h2>
        <p class="auth-help">
          スケジュール編集権限を持つメールアドレスを入力してください。
        </p>
        <form id="auth-form" class="auth-form" novalidate>
          <input
            id="auth-email"
            type="email"
            placeholder="メールアドレス"
            autocomplete="email"
            required
          />
          <button type="submit" id="auth-submit">確認</button>
        </form>
        <p class="auth-error" id="auth-error" hidden></p>
        <p class="auth-note">
          ※ 編集権限のないアドレスではログインできません。<br />
          権限が必要な場合は奥原までご連絡ください。
        </p>
      </div>
    </section>

    <!-- メイン画面（認証通過後に表示） -->
    <section id="main-screen" class="main-screen" hidden>
      <div class="toolbar">
        <div class="toolbar__row">
          <span class="user-badge">
            <span class="user-badge__label">ログイン中:</span>
            <span class="user-badge__email" id="user-email">—</span>
            <button type="button" id="logout-button" class="logout-button">
              ログアウト
            </button>
          </span>
        </div>
        <div class="toolbar__row">
          <div class="month-control" id="month-control">
            <button type="button" id="prev-month" class="month-btn">◀</button>
            <span class="month-label" id="month-label">—</span>
            <button type="button" id="next-month" class="month-btn">▶</button>
          </div>
          <div class="filter-control">
            <input
              type="text"
              id="quick-filter"
              placeholder="ヘルパー名 / 利用者名で絞り込み..."
              class="quick-filter"
            />
          </div>
          <button type="button" id="create-button" class="create-btn">
            ＋ 新規追加
          </button>
          <button type="button" id="trash-toggle" class="trash-toggle-btn">
            🗑 ゴミ箱を表示
          </button>
          <button type="button" id="reload-button" class="reload-btn">
            🔄 再読み込み
          </button>
          <button type="button" id="hard-reset-button" class="hard-reset-btn" title="動かなくなった時用。キャッシュを全消去してページを再読み込みします">
            🛟 強制リセット
          </button>
        </div>
        <p class="toolbar__status" id="status-line">読み込み中…</p>
      </div>

      <div id="grid-container" class="ag-theme-alpine grid-container"></div>

      <footer class="page-footer">
        <p>
          💡 セルを <strong>ダブルクリック</strong>で編集できます（日付以外）。
          変更は <strong>自動保存</strong>。<br />
          各行の右端 🗑 で削除（ゴミ箱に移動・復元可能）。
          ゴミ箱画面では「↩ 復元」で戻せます。
        </p>
      </footer>
    </section>

    <!-- 新規追加モーダル -->
    <div id="create-modal" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-labelledby="create-modal-title">
        <header class="modal-header">
          <h2 id="create-modal-title">新規予定の追加</h2>
          <button type="button" id="create-cancel-x" class="modal-close" aria-label="閉じる">×</button>
        </header>

        <form id="create-form" class="modal-form" novalidate>
          <div class="modal-row">
            <label for="create-date">日付 <span class="required">*</span></label>
            <input type="date" id="create-date" required />
          </div>

          <div class="modal-row">
            <label for="create-client">利用者 <span class="required">*</span></label>
            <input type="text" id="create-client" required placeholder="例: 山田太郎様" />
          </div>

          <div class="modal-row">
            <label for="create-helper">ヘルパー</label>
            <input type="text" id="create-helper" placeholder="例: 池田" />
          </div>

          <div class="modal-row modal-row--two">
            <div>
              <label for="create-start">開始</label>
              <input type="text" id="create-start" placeholder="例: 915 → 09:15" />
            </div>
            <div>
              <label for="create-end">終了</label>
              <input type="text" id="create-end" placeholder="例: 1030 → 10:30" />
            </div>
          </div>

          <div class="modal-row">
            <label for="create-haisha">配車</label>
            <input type="text" id="create-haisha" placeholder="例: スバル / プリウスで〜" />
          </div>

          <div class="modal-row">
            <label for="create-task">内容</label>
            <input type="text" id="create-task" placeholder="例: 移動 / 身体 / 通院" />
          </div>

          <div class="modal-row">
            <label for="create-summary">概要</label>
            <textarea id="create-summary" rows="2" placeholder="例: 自宅→かたつむり"></textarea>
          </div>

          <div class="modal-row">
            <label for="create-beneficiary">受給者証番号</label>
            <input type="text" id="create-beneficiary" placeholder="任意" />
          </div>

          <p id="create-error" class="modal-error" hidden></p>

          <footer class="modal-footer">
            <button type="button" id="create-cancel" class="modal-btn modal-btn--cancel">キャンセル</button>
            <button type="submit" id="create-submit" class="modal-btn modal-btn--primary">追加する</button>
          </footer>
        </form>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
