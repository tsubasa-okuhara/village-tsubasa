<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>声のポスト（管理） - ビレッジひろば</title>
    <style>
      :root {
        --bg: #fffdf8;
        --panel: #ffffff;
        --line: #e4d5bf;
        --text: #3e342f;
        --muted: #72655d;
        --accent: #d5bb93;
        --accent-strong: #c7a773;
        --accent-soft: #f3eadc;
        --success: #587960;
        --success-soft: #e8f0ea;
        --danger: #b54d59;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(235, 221, 198, 0.6), transparent 28%),
          linear-gradient(180deg, #fffefb 0%, var(--bg) 42%, #f8f3ea 100%);
      }

      .page {
        width: min(760px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .back-home-btn {
        display: inline-block;
        margin-bottom: 16px;
        padding: 10px 20px;
        background: #6b4c3b;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 12px;
        border: 2px solid #5a3e2f;
        box-shadow: 0 2px 8px rgba(107, 76, 59, 0.18);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .back-home-btn:hover {
        background: #5a3e2f;
        box-shadow: 0 4px 12px rgba(107, 76, 59, 0.28);
      }
      .back-home-btn:active {
        background: #4a3025;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .header h1 {
        font-size: 1.4rem;
        margin: 0;
      }

      .filter-bar {
        display: flex;
        gap: 6px;
      }
      .filter-btn {
        padding: 6px 14px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #fff;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-btn:hover { border-color: var(--accent); }
      .filter-btn.active {
        background: var(--accent-strong);
        color: #fff;
        border-color: var(--accent-strong);
      }

      .auth-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 8px 24px rgba(126, 103, 86, 0.06);
      }
      .auth-panel p {
        color: var(--muted);
        margin: 0 0 16px;
        font-size: 0.92rem;
      }
      .auth-notice {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 12px;
      }

      .feedback-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .feedback-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: 0 4px 16px rgba(126, 103, 86, 0.04);
        transition: border-color 0.15s;
      }
      .feedback-card.unread {
        border-left: 4px solid var(--accent-strong);
      }

      .feedback-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .feedback-meta {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .cat-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 12px;
        background: var(--accent-soft);
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--accent-strong);
      }
      .time-label {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .feedback-body {
        font-size: 0.94rem;
        line-height: 1.7;
        white-space: pre-wrap;
        margin-bottom: 12px;
      }

      .feedback-actions {
        display: flex;
        gap: 8px;
      }
      .action-btn {
        padding: 5px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }
      .action-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .action-btn.read-btn { color: var(--success); }
      .action-btn.archive-btn { color: var(--danger); }

      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 10px;
        background: var(--danger);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        margin-left: 4px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }

      .reply-form {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }
      .reply-textarea {
        width: 100%;
        min-height: 80px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 0.9rem;
        font-family: inherit;
        line-height: 1.6;
        resize: vertical;
        color: var(--text);
      }
      .reply-textarea:focus {
        outline: none;
        border-color: var(--accent-strong);
      }
      .reply-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .admin-reply {
        margin-top: 10px;
        padding: 12px 14px;
        background: var(--success-soft);
        border-radius: 10px;
        border-left: 3px solid var(--success);
      }
      .admin-reply__label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--success);
        margin-bottom: 4px;
      }
      .admin-reply__body {
        font-size: 0.9rem;
        line-height: 1.6;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a href="/" class="back-home-btn">← ビレッジひろばに戻る</a>

      <!-- 認証パネル（未認証時） -->
      <div class="auth-panel" id="auth-panel">
        <p>管理者のメールアドレスを入力してください</p>
        <div style="display: flex; gap: 8px; max-width: 400px; margin: 0 auto;">
          <input
            type="email"
            id="admin-email"
            placeholder="admin@village-support.jp"
            style="flex: 1; padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px; font-size: 0.92rem;"
          />
          <button
            type="button"
            id="auth-btn"
            style="padding: 10px 20px; background: var(--accent-strong); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;"
          >確認</button>
        </div>
        <p class="auth-notice">※ 管理者以外はアクセスできません</p>
      </div>

      <!-- メインコンテンツ（認証後） -->
      <div id="main-content" style="display: none;">
        <div class="header">
          <h1>📮 声のポスト（管理）</h1>
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="">すべて</button>
            <button class="filter-btn" data-filter="unread">未読<span id="unread-badge" class="count-badge" style="display: none;">0</span></button>
            <button class="filter-btn" data-filter="read">既読</button>
            <button class="filter-btn" data-filter="archived">対応済み</button>
          </div>
        </div>

        <div id="feedback-container" class="feedback-list">
          <div class="loading">読み込み中…</div>
        </div>
      </div>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
