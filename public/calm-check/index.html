<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>落ち着き確認 - ビレッジひろば</title>
    <style>
      :root {
        --bg: #fffdf8;
        --panel: #ffffff;
        --line: #e4d5bf;
        --text: #3e342f;
        --muted: #72655d;
        --accent: #5b7fa6;
        --accent-strong: #4a6d91;
        --accent-soft: #e3edf5;
        --success: #587960;
        --success-soft: #e8f0ea;
        --danger: #b54d59;
        --danger-soft: #fce8ea;
        --warning: #c29036;
        --warning-soft: #fdf3e0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(198, 218, 235, 0.6), transparent 28%),
          radial-gradient(circle at top right, rgba(225, 237, 247, 0.95), transparent 34%),
          linear-gradient(180deg, #fbfdff 0%, var(--bg) 42%, #eaf1f8 100%);
      }

      .page {
        width: min(640px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .back-home-btn {
        display: inline-block;
        margin-bottom: 16px;
        padding: 10px 20px;
        background: #6b4c3b;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 12px;
        transition: background 0.2s;
      }
      .back-home-btn:hover { background: #5a3e2e; }

      h1 {
        font-size: 1.5rem;
        margin: 0 0 4px;
        color: var(--accent-strong);
      }
      .subtitle {
        font-size: 0.9rem;
        color: var(--muted);
        margin: 0 0 20px;
      }

      /* --- 確認カード --- */
      .check-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      }

      .check-card__header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .check-card__icon {
        width: 40px;
        height: 40px;
        background: var(--accent-soft);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
      }

      .check-card__name {
        font-size: 1.15rem;
        font-weight: 700;
        margin: 0;
      }

      .check-card__meta {
        font-size: 0.85rem;
        color: var(--muted);
        margin: 0 0 16px;
        line-height: 1.6;
      }

      .check-card__meta span {
        display: inline-block;
        background: var(--accent-soft);
        padding: 2px 8px;
        border-radius: 6px;
        margin: 2px 4px 2px 0;
        font-size: 0.82rem;
      }

      /* --- 質問ステップ --- */
      .step { display: none; }
      .step.active { display: block; }

      .step__question {
        font-size: 1.05rem;
        font-weight: 600;
        text-align: center;
        margin: 0 0 16px;
        color: var(--text);
      }

      .choice-buttons {
        display: flex;
        gap: 12px;
      }

      .choice-btn {
        flex: 1;
        padding: 16px 12px;
        border: 2px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-family: inherit;
      }

      .choice-btn:active { transform: scale(0.97); }
      .choice-btn--calm:hover,
      .choice-btn--calm.selected {
        border-color: var(--success);
        background: var(--success-soft);
        color: var(--success);
      }
      .choice-btn--not-calm:hover,
      .choice-btn--not-calm.selected {
        border-color: var(--danger);
        background: var(--danger-soft);
        color: var(--danger);
      }
      .choice-btn--overall:hover,
      .choice-btn--overall.selected {
        border-color: var(--danger);
        background: var(--danger-soft);
        color: var(--danger);
      }
      .choice-btn--partial:hover,
      .choice-btn--partial.selected {
        border-color: var(--warning);
        background: var(--warning-soft);
        color: var(--warning);
      }

      /* --- メモ入力 --- */
      .memo-area {
        width: 100%;
        min-height: 100px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        font-size: 0.95rem;
        font-family: inherit;
        color: var(--text);
        background: var(--panel);
        resize: vertical;
        margin-bottom: 12px;
      }
      .memo-area:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(91, 127, 166, 0.15);
      }

      .submit-btn {
        display: block;
        width: 100%;
        padding: 16px;
        background: var(--accent-strong);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s;
      }
      .submit-btn:hover { background: #3d5c7a; }
      .submit-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      /* --- 完了 --- */
      .done-message {
        text-align: center;
        padding: 24px 16px;
      }
      .done-message__icon {
        font-size: 2.5rem;
        margin-bottom: 8px;
      }
      .done-message__text {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--success);
      }

      /* --- 空リスト --- */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .empty-state__icon {
        font-size: 3rem;
        margin-bottom: 12px;
      }
      .empty-state__text {
        font-size: 1.05rem;
        font-weight: 500;
      }

      /* --- ローディング --- */
      .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid var(--line);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="/" class="back-home-btn">&larr; ビレッジひろばに戻る</a>
      <h1>落ち着き確認</h1>
      <p class="subtitle">対象利用者さんの支援後の様子を共有します</p>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>

      <div id="empty" class="empty-state" style="display:none;">
        <div class="empty-state__icon">&#9745;</div>
        <p class="empty-state__text">確認が必要な予定はありません</p>
      </div>

      <div id="checks-container"></div>
    </div>

    <script src="/lib/helperEmail.js"></script>
    <script src="main.js"></script>
  </body>
</html>
