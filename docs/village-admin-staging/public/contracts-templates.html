<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>契約テンプレート管理 - village-admin</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .template-card {
        background: #fff;
        border: 1px solid #e4d5bf;
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 12px;
      }
      .template-card.inactive { opacity: 0.55; }
      .template-card h3 { margin: 0 0 6px; color: #5a3e2f; font-size: 1.05rem; }
      .template-meta { font-size: 0.85rem; color: #72655d; margin-bottom: 10px; }
      .field-list {
        background: #faf4e8;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        color: #5a3e2f;
      }
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(58, 42, 27, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal-backdrop.open { display: flex; }
      .modal {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        width: min(560px, calc(100% - 40px));
        max-height: 85vh;
        overflow: auto;
      }
      .modal h2 { margin-top: 0; }
      .modal label { display:block; margin-top: 12px; font-size:0.9rem; color:#72655d; }
      .modal input, .modal select, .modal textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d9d0c2;
        border-radius: 8px;
        font-size: 0.95rem;
      }
      .modal textarea { min-height: 120px; font-family: monospace; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <header>
      <nav></nav>
      <h1>📄 契約テンプレート管理</h1>
    </header>

    <main class="page">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
        <a href="contracts.html" class="btn btn-secondary">← 契約一覧へ</a>
        <button id="openNewModal" class="btn btn-primary">＋ 新規テンプレート</button>
      </div>

      <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
        <input type="checkbox" id="includeInactive" />
        <span>停止中も表示</span>
      </label>

      <div id="list">読み込み中...</div>
    </main>

    <div id="modal" class="modal-backdrop">
      <div class="modal">
        <h2>新規テンプレート</h2>
        <form id="newForm">
          <label>種類
            <select name="kind" required>
              <option value="employment">雇用契約</option>
              <option value="nda">秘密保持</option>
              <option value="service_agreement">業務委託</option>
              <option value="important_matter">重要事項説明書</option>
            </select>
          </label>
          <label>タイトル
            <input name="title" placeholder="ヘルパー雇用契約書 2026年度版" required />
          </label>
          <label>差し込みフィールド定義 (JSON配列)
            <textarea name="fillable_fields" placeholder='[{"key":"helper_name","label":"氏名","required":true}]'></textarea>
          </label>
          <label>署名位置定義 (JSON配列、Phase 3.2 以降で使用)
            <textarea name="signature_positions" placeholder="[]"></textarea>
          </label>
          <p style="font-size:0.85rem; color:#72655d; margin-top:10px;">
            ※ PDF本文アップロードは Phase 3.2 以降。当面は Storage 側で直接アップロード → URL を取得。
          </p>
          <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:16px;">
            <button type="button" id="cancelBtn" class="btn btn-secondary">キャンセル</button>
            <button type="submit" class="btn btn-primary">登録</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const API =
          "https://asia-northeast1-village-tsubasa.cloudfunctions.net/api";
        const ADMIN_EMAIL = "admin@village-support.jp";

        const listEl = document.getElementById("list");
        const includeInactiveEl = document.getElementById("includeInactive");
        const modal = document.getElementById("modal");

        document.getElementById("openNewModal").onclick = function () {
          modal.classList.add("open");
        };
        document.getElementById("cancelBtn").onclick = function () {
          modal.classList.remove("open");
        };

        includeInactiveEl.addEventListener("change", load);
        document.getElementById("newForm").addEventListener("submit", onSubmit);

        load();

        async function load() {
          const params = new URLSearchParams({ email: ADMIN_EMAIL });
          if (includeInactiveEl.checked) params.set("includeInactive", "1");
          listEl.innerHTML = "読み込み中...";
          try {
            const res = await fetch(API + "/contracts/templates?" + params);
            const json = await res.json();
            render(json.templates || []);
          } catch (err) {
            listEl.innerHTML = '<div style="color:#b54d59;">取得に失敗しました</div>';
          }
        }

        function render(list) {
          if (!list.length) {
            listEl.innerHTML = '<div style="padding:20px; color:#72655d;">テンプレートがありません。</div>';
            return;
          }
          listEl.innerHTML = "";
          list.forEach(function (t) {
            const card = document.createElement("div");
            card.className = "template-card" + (t.is_active ? "" : " inactive");
            const fields = Array.isArray(t.fillable_fields)
              ? t.fillable_fields.map(function (f) { return f.label || f.key; }).join(" / ")
              : "";
            card.innerHTML =
              "<h3>" + escapeHtml(t.title) + " (v" + t.version + ")</h3>" +
              '<div class="template-meta">' +
              t.kind + " ・ " +
              (t.is_active ? "稼働中" : "停止中") +
              " ・ 作成: " +
              new Date(t.created_at).toLocaleDateString("ja-JP") +
              "</div>" +
              '<div class="field-list">差し込み項目: ' + (fields || "(なし)") + "</div>" +
              '<div style="margin-top:10px; display:flex; gap:8px;">' +
              (t.is_active
                ? '<button class="btn btn-secondary" data-act="deactivate" data-id="' + t.id + '">停止</button>'
                : "") +
              '<button class="btn btn-primary" data-act="new-version" data-id="' + t.id + '">新バージョン作成</button>' +
              "</div>";
            listEl.appendChild(card);
          });

          listEl.querySelectorAll("button[data-act]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              const id = btn.dataset.id;
              const act = btn.dataset.act;
              if (act === "deactivate") {
                if (!confirm("このテンプレートを停止しますか？")) return;
                fetch(API + "/contracts/templates/" + id + "/deactivate", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ email: ADMIN_EMAIL }),
                }).then(load);
              } else if (act === "new-version") {
                alert("TODO: 新バージョン作成画面を実装（Phase 3.2 前後で）");
              }
            });
          });
        }

        async function onSubmit(e) {
          e.preventDefault();
          const fd = new FormData(e.target);
          const body = {
            email: ADMIN_EMAIL,
            kind: fd.get("kind"),
            title: fd.get("title"),
            fillable_fields: safeParse(fd.get("fillable_fields"), []),
            signature_positions: safeParse(fd.get("signature_positions"), []),
          };
          try {
            const res = await fetch(API + "/contracts/templates", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || "失敗");
            modal.classList.remove("open");
            e.target.reset();
            load();
          } catch (err) {
            alert("登録失敗: " + err.message);
          }
        }

        function safeParse(s, fallback) {
          try { return JSON.parse(s || "null") ?? fallback; } catch { return fallback; }
        }

        function escapeHtml(s) {
          return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }
      })();
    </script>
  </body>
</html>
